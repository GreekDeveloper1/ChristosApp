name: Build ChristosApp IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger manually from GitHub website

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Resize app icon to 1024x1024
        run: |
          sips -z 1024 1024 ChristosApp/Assets.xcassets/AppIcon.appiconset/AppIcon.png

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -project ChristosApp.xcodeproj \
            -scheme ChristosApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$GITHUB_WORKSPACE/build/ChristosApp.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package into .ipa
        run: |
          ARCHIVE="$GITHUB_WORKSPACE/build/ChristosApp.xcarchive"
          APP_PATH=$(find "$ARCHIVE/Products/Applications" -name "*.app" -maxdepth 1 | head -1)
          echo "Found app: $APP_PATH"

          mkdir -p "$GITHUB_WORKSPACE/build/Payload"
          cp -r "$APP_PATH" "$GITHUB_WORKSPACE/build/Payload/"

          cd "$GITHUB_WORKSPACE/build"
          zip -r ChristosApp.ipa Payload
          echo "✅ IPA size: $(du -sh ChristosApp.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChristosApp-unsigned-ipa
          path: build/ChristosApp.ipa
          retention-days: 30
          if-no-files-found: error
