name: ChristosApp
options:
  bundleIdPrefix: com.christospapavas
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "16"

targets:
  ChristosApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ChristosApp
    info:
      path: ChristosApp/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "Christos App uses Bluetooth to discover and control nearby smart devices."
        NSBluetoothPeripheralUsageDescription: "Christos App uses Bluetooth to discover and control nearby BLE devices."
        NSLocalNetworkUsageDescription: "Christos App uses your local network to discover and control Smart TVs and other devices."
        NSBonjourServices:
          - _airplay._tcp
          - _googlecast._tcp
          - _androidtvremote._tcp
          - _androidtvremote2._tcp
          - _samsung-tv._tcp
          - _webostv._tcp
          - _sony-adcp._tcp
          - _http._tcp
          - _https._tcp
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.christospapavas.christosapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_BITCODE: "NO"
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: CoreBluetooth.framework
      - sdk: Network.framework
      - sdk: Security.framework
